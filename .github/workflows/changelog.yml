name: System-wide deploy changelog

# Emits one JSON entry to s3://alpha-engine-research/changelog/ on every
# push-to-main. See alpha-engine-docs/.github/actions/append-changelog/README.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: changelog-main
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  append:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (shallow)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Append to system-wide deploy changelog
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@8a904b7a817901f2520dd87131ff307ed97fee02 # main @ 2026-07-15
        with:
          deploy_status: merged
          deploy_workflow: changelog.yml
