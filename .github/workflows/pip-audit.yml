name: pip-audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 14:00 UTC — CVE feeds publish on a rolling cadence; daily
    # is the smallest cadence that's actually useful (mirrors mnemon's
    # pip-audit.yml, config#2530).
    - cron: "0 14 * * *"
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit declared dependencies
        # `pip-audit . --strict` audits only the deps declared in
        # pyproject.toml's base `dependencies` (not the optional extras,
        # not the toolchain). Any vulnerability in a runtime dep fails the
        # workflow; add `--ignore-vuln <ID>` here with a reason comment if
        # a transitive dep has no fix available (mirrors mnemon's pattern).
        run: pip-audit --strict .
