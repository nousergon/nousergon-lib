name: IAM Drift Post-Merge Apply

# Reusable (workflow_call) fleet primitive: reconcile codified IAM against
# live AWS AFTER a PR merges, instead of blocking the PR on a comparison
# that is structurally guaranteed to show drift pre-merge (config#3495).
#
# A PR that codifies new IAM is, by definition, ahead of live AWS — nothing
# has run apply.sh yet. Comparing codified-vs-live as a REQUIRED PR check
# means every IAM PR shows red until merge+apply, which trained the fleet to
# treat red IAM checks as noise. This workflow instead runs once the PR has
# actually merged: apply drifted roles, re-check, fail only on residual
# (real, unexpected) drift.
#
# Consumers call this with a top-level trigger of:
#   pull_request_target:
#     types: [closed]
#     paths: ['infrastructure/iam/**']
# and a `if: github.event.pull_request.merged == true` guard on the calling
# job, then `uses: nousergon/nousergon-lib/.github/workflows/iam-drift-post-merge.yml@main`
# passing `oidc-role-arn` (a WRITE-scoped OIDC role — NOT the read-only role
# the PR-triggered drift check uses) and `check-script-path` (repo-specific,
# since not every consumer repo's check-drift.py lives at the same path).
#
# pull_request_target runs with the BASE ref's workflow file + secrets/OIDC
# access even when triggered by a fork PR — safe here because the checkout
# step below explicitly checks out the MERGE COMMIT on the base branch
# (github.event.pull_request.merge_commit_sha), never the PR head, so a
# malicious PR cannot smuggle a modified check-drift.py into this run.

on:
  workflow_call:
    inputs:
      oidc-role-arn:
        description: "WRITE-scoped OIDC role ARN (iam:PutRolePolicy/UpdateAssumeRolePolicy/AttachRolePolicy + the read set)"
        required: true
        type: string
      aws-region:
        description: "AWS region for the OIDC session"
        required: false
        type: string
        default: us-east-1
      check-script-path:
        description: "Path (relative to repo root) to this repo's check-drift.py"
        required: false
        type: string
        default: infrastructure/iam/check-drift.py

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  apply-and-reconcile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merge commit (never the PR head — see header)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}

      - name: Configure AWS credentials via OIDC (write-scoped)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d  # v6
        with:
          role-to-assume: ${{ inputs.oidc-role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Auto-apply drifted roles and re-check
        env:
          CHECK_SCRIPT: ${{ inputs.check-script-path }}
        run: python3 "$CHECK_SCRIPT" --post-merge
