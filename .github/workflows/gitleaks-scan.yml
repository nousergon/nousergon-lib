name: Gitleaks scan (reusable)

# Fleet-wide gitleaks primitive (alpha-engine-config-I3005): full-history
# secret/sensitive-content scan for org repos, complementing GitHub's native
# secret scanning (known-provider patterns only, e.g. AWS/Anthropic/Stripe
# token shapes) with gitleaks' broader default ruleset and custom-pattern
# support. It also catches anything committed to history before push
# protection existed, which push protection itself cannot retroactively see.
#
# Findings are uploaded as SARIF to GitHub Code Scanning rather than filed
# as issues directly. This means the EXISTING config-I2528 weekly fleet
# security-alert sweep — which already enumerates code-scanning alerts
# alongside Dependabot/secret-scanning ones — picks up gitleaks findings
# automatically as a 4th alert category, with zero changes to
# security_alert_sweep.py. Reuses the existing backlog/groom/Telegram
# pipeline instead of building a parallel one.
#
# Binary is downloaded pinned-by-version and SHA256-verified rather than via
# gitleaks/gitleaks-action, which requires a paid license for GitHub
# Organization accounts (nousergon is an org) regardless of repo visibility.
#
# Baseline: repo root `.gitleaks-baseline.json`, generated once via
#   gitleaks detect --report-path .gitleaks-baseline.json
# against the repo's current history and committed, so pre-existing/accepted
# findings don't redline CI on rollout (mirrors the pre-clear-before-flip
# playbook used for the fleet's pip-audit standardization, config-I2530).
# Regenerate the same way after triaging and accepting a real finding.
#
# Consumers: a thin caller workflow (see this repo's own
# .github/workflows/gitleaks.yml for the in-repo example; other repos use
# `uses: nousergon/nousergon-lib/.github/workflows/gitleaks-scan.yml@main`
# with `secrets: inherit`), triggered on push to main and a weekly schedule.
# Edit scan behavior HERE once — callers never change.

on:
  workflow_call:

env:
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned, checksum-verified)
        run: |
          set -euo pipefail
          curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run gitleaks (full history, baseline-aware, SARIF)
        id: detect
        run: |
          set -euo pipefail
          BASELINE_ARGS=""
          if [ -f .gitleaks-baseline.json ]; then
            BASELINE_ARGS="--baseline-path .gitleaks-baseline.json"
          fi
          # shellcheck disable=SC2086
          gitleaks detect --source . $BASELINE_ARGS \
            --report-format sarif --report-path gitleaks-results.sarif \
            --redact

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category: gitleaks
