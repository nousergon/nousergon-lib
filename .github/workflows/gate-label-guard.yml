name: Gate Label Guard

# DEPRECATED 2026-07-24. This reusable workflow has been replaced by inline
# workflows in each consumer repo. The reusable pattern introduced failure
# modes the inline check does not have: workflow_call startup_failure,
# @main caching, toJson() expression-eval size limits, per-consumer pinning
# choreography, merge_group trigger gaps.
#
# Each consumer repo now owns its own copy (~55 lines, self-contained).
# This file is retained as a tombstone to prevent new consumers from
# adopting the reusable pattern. Delete after all consumers have migrated.
#
# Migration PRs (2026-07-24): alpha-engine-config, nousergon-data,
# crucible-backtester, crucible-dashboard — each fix/inline-gate-label-guard.

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  guard:
    name: gate-label-guard (DEPRECATED)
    runs-on: ubuntu-latest
    steps:
      - name: DEPRECATED — use inline workflow
        run: |
          echo "::warning::The reusable gate-label-guard is DEPRECATED. Each repo now owns its own inline copy at .github/workflows/gate-label-guard.yml. Update your consumer to use an inline workflow instead of calling this one."
          echo "Migration PRs: fix/inline-gate-label-guard on alpha-engine-config, nousergon-data, crucible-backtester, crucible-dashboard."
          # Pass — don't break existing consumers during migration window.
