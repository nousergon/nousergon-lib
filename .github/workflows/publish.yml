name: Publish to PyPI

# Publishes the current pyproject.toml version to PyPI via OIDC trusted
# publishing on every push to main. Idempotent — `skip-existing: true`
# makes re-runs against an already-uploaded version a no-op, so
# docs-only / no-version-bump PRs harmlessly trigger this workflow.
#
# Trigger choice: `push: branches: [main]` rather than `push: tags`.
# auto-tag.yml uses the GITHUB_TOKEN to push the version tag, which by
# default does NOT trigger downstream workflows — so a `tags:` trigger
# would never fire from a normal merge. Triggering on the merge itself
# closes that gap and removes the "did anyone push the tag?" coordination
# step that bit morning-signal's publish path.
#
# workflow_dispatch is kept for manual recovery (failed first attempt,
# pending-trusted-publisher bootstrap, etc.).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify artifacts with twine check
        run: twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC trusted-publishing requires id-token: write at the job level.
    # No PYPI_API_TOKEN secret is used — PyPI verifies the workflow
    # identity (project + repo + workflow filename + environment).
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/alpha-engine-lib/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # No-op when the version is already on PyPI. Lets every main
          # merge attempt a publish without failing on no-version-bump
          # PRs (docs, CI, internal refactors).
          skip-existing: true
