name: Notify CI failure

# Reusable (workflow_call) fleet primitive: send ONE operator alert when a
# consumer repo's CI fails. Consumers gate the call on
# `failure() && github.ref == 'refs/heads/main'` so the alert fires only on
# genuine post-merge breakage of the default branch — PR-branch CI churn
# (mid-fix commits, cross-repo lib-tag merge-order races) stays silent.
#
# Origin: 2026-06-17 — the built-in GitHub Actions failure email fires on
# every red run regardless of whether the next run goes green, so transient
# PR-branch reds (e.g. a consumer pinning a lib tag the auto-tag job hasn't
# created yet) were generating noise indistinguishable from real breakage.
# GitHub has no "only if it stays red" / "only the default branch" knob, so
# we turn the built-in email OFF and route the real signal here.
#
# Transport reuses the canonical `krepis.alerts` primitive (SNS + Telegram
# fan-out; relocated from `nousergon_lib.alerts` to the MIT `krepis` package
# at nousergon-lib v0.66.0 — config#1339). This workflow runs Telegram-ONLY (`--no-sns`):
# Telegram needs no AWS creds in the runner (ALPHA_ENGINE_SECRETS_SOURCE=env
# forces env-only secret resolution), and keeps the alert in the deliberate
# @nous_ergon_alerts_bot operator channel rather than the email firehose.
#
# No `--dedup-key`: the alerts dedup marker lives in S3 (needs AWS creds,
# which the Telegram-only path deliberately avoids). Default-branch CI
# failures are infrequent, and a flapping `main` is a signal worth repeating
# until it's fixed — so every gated failure alerts.
#
# CI-watch dispatch (config#1593): after the alert, a second step hands the
# failure to the autonomous Fleet CI Watch agent via a repository_dispatch
# (type `ci-main-failure`) to nousergon/alpha-engine-config, whose
# sf-watch.yml listener runs the .github/ci-watch-prompt.md charter
# (diagnose → rerun transients / fix defects → leave main green → report).
# Requires org secret SF_WATCH_DISPATCH_PAT (fine-grained PAT with
# Contents R/W on alpha-engine-config — repository_dispatch is a
# contents-write operation). The step warns-and-skips when the secret is
# absent so a not-yet-onboarded consumer still alerts cleanly.

on:
  workflow_call:
    inputs:
      lib_ref:
        description: "nousergon-lib git ref to install the alerts CLI from."
        required: false
        type: string
        default: "v0.89.0"
    secrets:
      TELEGRAM_BOT_TOKEN:
        required: true
      TELEGRAM_CHAT_ID:
        required: true
      SF_WATCH_DISPATCH_PAT:
        description: "Fine-grained PAT (Contents R/W on alpha-engine-config) used to fire the ci-main-failure repository_dispatch to the Fleet CI Watch (config#1593). Optional: absent → dispatch skipped with a ::warning, alert unaffected."
        required: false

jobs:
  notify:
    name: telegram alert
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install alerts CLI (base lib, no extras)
        run: pip install "nousergon-lib @ git+https://github.com/nousergon/nousergon-lib@${{ inputs.lib_ref }}"

      - name: Publish Telegram alert
        env:
          # Force env-only secret resolution — no SSM round-trip / AWS creds.
          ALPHA_ENGINE_SECRETS_SOURCE: env
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python -m krepis.alerts publish \
            --no-sns \
            --severity error \
            --source "ci:${{ github.repository }}@${{ github.ref_name }}" \
            --message "🔴 CI RED on main — ${{ github.repository }} @ ${{ github.sha }}
          Workflow: ${{ github.workflow }}
          Run: ${RUN_URL}"

      # Secondary observability hung off the primary alert path: when the org
      # secret is not configured the dispatch is SKIPPED with a ::warning (the
      # recording surface) rather than failing the job — the Telegram alert
      # above already delivered this workflow's primary deliverable, and a
      # missing-secret hard-fail would bury that success under an unrelated
      # red during the fleet-wide secret rollout. A configured-but-failing
      # dispatch DOES fail the step (curl --fail) — that is a real defect and
      # must surface loudly.
      - name: Dispatch Fleet CI Watch (config#1593)
        if: ${{ always() }}
        env:
          DISPATCH_PAT: ${{ secrets.SF_WATCH_DISPATCH_PAT }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
          GH_RUN_ID: ${{ github.run_id }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_WORKFLOW: ${{ github.workflow }}
          GH_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$DISPATCH_PAT" ]; then
            echo "::warning::SF_WATCH_DISPATCH_PAT not configured — Fleet CI Watch NOT dispatched for this failure (config#1593 operator step pending). The Telegram alert above still fired."
            exit 0
          fi
          jq -n \
            --arg repo "$GH_REPOSITORY" \
            --arg sha "$GH_SHA" \
            --arg run_id "$GH_RUN_ID" \
            --arg run_url "$GH_SERVER_URL/$GH_REPOSITORY/actions/runs/$GH_RUN_ID" \
            --arg workflow "$GH_WORKFLOW" \
            --arg branch "$GH_REF_NAME" \
            '{event_type: "ci-main-failure", client_payload: {repo: $repo, sha: $sha, run_id: $run_id, run_url: $run_url, workflow: $workflow, branch: $branch}}' \
          | curl -sS --fail-with-body -X POST \
              -H "Authorization: token $DISPATCH_PAT" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/nousergon/alpha-engine-config/dispatches \
              -d @-
          echo "Dispatched ci-main-failure for $GH_REPOSITORY run $GH_RUN_ID"
