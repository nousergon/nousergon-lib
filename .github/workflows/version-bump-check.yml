name: Version-bump check

# INVERTED as of config-I2716 (2026-07-16): PRs must NOT touch the version.
#
# The old contract ("every src-touching PR bumps pyproject::version") made
# every pair of concurrently-open PRs conflict on the version line — each
# merge re-conflicted every sibling PR (the "version-bump conflict
# treadmill"; evidence: nousergon-lib #190 accumulated 5+ bot merge-of-main
# commits in 3 days, conflicting again within hours each time).
#
# New contract:
#   - PRs leave pyproject.toml::version and __init__.__version__ untouched.
#   - ``auto-version-bump.yml`` bumps the patch version AT MERGE TIME (push
#     to main), via a deploy-key ruleset bypass; ``auto-tag.yml`` +
#     ``publish.yml`` then release exactly as before. The original defect
#     this workflow guarded (src change merges → auto-tag idempotently
#     skips → downstream pin fails; alpha-engine-lib #76, 2026-05-25) is
#     now impossible rather than merely detected: the version writer runs
#     unconditionally after every src-touching merge.
#   - Deliberate minor/major releases: label the PR ``release:manual`` and
#     edit both version lines; this check then validates lockstep +
#     monotonicity + not-already-tagged instead of forbidding the edit.
#
# Composes with:
#   - ``auto-version-bump.yml``: the sole routine version writer.
#   - ``tests/test_version_pin.py``: pyproject/__init__ lockstep invariant.

permissions: {}

on:
  pull_request:
    branches: [main]
    # labeled/unlabeled included so applying release:manual re-evaluates
    # the check without needing a new push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  version-policy:
    name: version untouched by PRs (merge-time autobump)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Read versions (merge-base vs PR, both files)
        id: versions
        run: |
          set -euo pipefail
          git fetch --no-tags origin "${GITHUB_BASE_REF}"
          # Compare against the MERGE-BASE, not main's tip (config-I2772
          # follow-up, 2026-07-16): the question is "did this PR EDIT the
          # version lines", not "is this PR's version current". Comparing
          # against the tip re-redded every open branch on every autobump
          # release (main 0.123.1→.3 in one afternoon re-failed lib#204/#205
          # and got them wrongly escalated+drafted). A branch that never
          # touched the version relative to its fork point passes; staleness
          # vs the moving tip is the auto-merge machinery's update-branch
          # concern, not a version-policy violation.
          base="$(git merge-base HEAD "origin/${GITHUB_BASE_REF}")"
          pr_py=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          git show "${base}:pyproject.toml" > /tmp/pyproject-base.toml
          base_py=$(python -c "import tomllib; print(tomllib.load(open('/tmp/pyproject-base.toml','rb'))['project']['version'])")
          pr_init=$(python -c "import re; print(re.search(r'__version__ = \"([^\"]+)\"', open('src/nousergon_lib/__init__.py').read()).group(1))")
          echo "base_py=${base_py}" >> "${GITHUB_OUTPUT}"
          echo "pr_py=${pr_py}" >> "${GITHUB_OUTPUT}"
          echo "pr_init=${pr_init}" >> "${GITHUB_OUTPUT}"
          echo "base ${base_py} → PR pyproject ${pr_py} / __init__ ${pr_init}"

      - name: Forbid version edits (unless release:manual)
        if: steps.versions.outputs.base_py != steps.versions.outputs.pr_py && !contains(github.event.pull_request.labels.*.name, 'release:manual')
        env:
          BASE_VERSION: ${{ steps.versions.outputs.base_py }}
          PR_VERSION: ${{ steps.versions.outputs.pr_py }}
        run: |
          set -euo pipefail
          cat >&2 <<EOF
          ERROR: this PR changes pyproject.toml::version (${BASE_VERSION} → ${PR_VERSION}).

          PRs no longer bump the version — auto-version-bump.yml bumps the
          patch version at merge time, which is what killed the version-line
          conflict treadmill (config-I2716). Revert the version lines in
          pyproject.toml and src/nousergon_lib/__init__.py to match main.

          Deliberate minor/major release: add the ``release:manual`` label
          to this PR and keep both version lines edited in lockstep.
          EOF
          exit 1

      - name: Forbid lone __init__ version edit (unless release:manual)
        if: steps.versions.outputs.base_py == steps.versions.outputs.pr_py && steps.versions.outputs.pr_init != steps.versions.outputs.pr_py && !contains(github.event.pull_request.labels.*.name, 'release:manual')
        run: |
          set -euo pipefail
          echo "ERROR: __init__.__version__ differs from pyproject.toml::version — PRs must leave BOTH untouched (autobump owns them)." >&2
          exit 1

      - name: Validate manual release (release:manual only)
        if: contains(github.event.pull_request.labels.*.name, 'release:manual')
        env:
          BASE_VERSION: ${{ steps.versions.outputs.base_py }}
          PR_VERSION: ${{ steps.versions.outputs.pr_py }}
          PR_INIT: ${{ steps.versions.outputs.pr_init }}
        run: |
          set -euo pipefail
          if [ "${PR_VERSION}" != "${PR_INIT}" ]; then
            echo "ERROR: release:manual PR must bump pyproject (${PR_VERSION}) and __init__ (${PR_INIT}) in lockstep." >&2
            exit 1
          fi
          if [ "${BASE_VERSION}" = "${PR_VERSION}" ]; then
            echo "ERROR: release:manual PR must actually change the version (still ${PR_VERSION})." >&2
            exit 1
          fi
          git fetch --tags origin
          if git tag --list | grep -Fxq "v${PR_VERSION}"; then
            echo "ERROR: v${PR_VERSION} already exists as a tag — pick the next unused version (git tag --list | sort -V | tail)." >&2
            exit 1
          fi
          highest=$(printf '%s\n' "${BASE_VERSION}" "${PR_VERSION}" | sort -V | tail -1)
          if [ "${highest}" != "${PR_VERSION}" ]; then
            echo "ERROR: manual release ${PR_VERSION} is not greater than base ${BASE_VERSION}." >&2
            exit 1
          fi
          echo "OK: manual release ${BASE_VERSION} → ${PR_VERSION} (lockstep, untagged, monotonic)."

      - name: Version untouched — OK
        if: steps.versions.outputs.base_py == steps.versions.outputs.pr_py && steps.versions.outputs.pr_init == steps.versions.outputs.pr_py
        run: |
          echo "OK: version untouched — auto-version-bump.yml releases on merge."
